# ci.yml — mps_rigid_body 主 CI 流水线
#
# 触发条件:
#   - push 到 main 分支
#   - 任意 PR 到 main 分支
#   - 手动触发 (workflow_dispatch)
#
# 作业:
#   1. rust  — cargo fmt, clippy, test, build --release (纯 Rust)
#   2. java21 — test21 Gradle smoke test (需要 JDK 21 + cargo build --release)
#   3. java25 — test25 Gradle smoke test (需要 JDK 25 + cargo build --release)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 1

jobs:

  # ==========================================================================
  # Rust: fmt + clippy + test + build --release
  # ==========================================================================

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

  # ==========================================================================
  # Java 21 JNI smoke test
  # ==========================================================================

  java21:
    name: Java 21 JNI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-java21-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-java21-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: cargo build --release
        run: cargo build --release

      - name: test21 Gradle check
        working-directory: test21
        run: ./gradlew check --no-daemon

  # ==========================================================================
  # Java 25 FFM smoke test
  # ==========================================================================

  java25:
    name: Java 25 FFM (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-java25-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-java25-

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: cargo build --release
        run: cargo build --release

      - name: test25 Gradle check
        working-directory: test25
        run: ./gradlew check --no-daemon
